services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cliniqai
      POSTGRES_PASSWORD: cliniqai
      POSTGRES_DB: cliniqai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    env_file:
      - ./gateway/.env
    depends_on:
      - postgres
    volumes:
      - ./gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: